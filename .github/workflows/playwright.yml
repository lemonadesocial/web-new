name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_GRAPHQL_URL: ${{ vars.E2E_GRAPHQL_URL || '' }}
    steps:
    - name: Check e2e readiness
      id: ready
      run: |
        if [ -z "$NEXT_PUBLIC_GRAPHQL_URL" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::notice::e2e infrastructure not configured — skipping. Set E2E_GRAPHQL_URL repo variable to enable."
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi
    - uses: actions/checkout@v4
      if: steps.ready.outputs.skip == 'false'
    - uses: actions/setup-node@v4
      if: steps.ready.outputs.skip == 'false'
      with:
        node-version: 22
        registry-url: 'https://npm.pkg.github.com'
        scope: '@lemonadesocial'
    - name: Install dependencies
      if: steps.ready.outputs.skip == 'false'
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: yarn install --frozen-lockfile
    - name: Build application
      if: steps.ready.outputs.skip == 'false'
      run: yarn build
    - name: Install Playwright Browsers
      if: steps.ready.outputs.skip == 'false'
      run: npx playwright install --with-deps
    - name: Run Playwright smoke tests on PRs (Chromium)
      if: steps.ready.outputs.skip == 'false' && github.event_name == 'pull_request'
      run: npx playwright test --project=chromium
    - name: Run full Playwright suite on main/master pushes
      if: steps.ready.outputs.skip == 'false' && github.event_name != 'pull_request'
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: steps.ready.outputs.skip == 'false' && !cancelled()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
