fragment ActiveSessionFields on ActiveSession {
  _id
  kratos_identity_id
  kratos_session_id
  client_type
  device_name
  device_model
  os
  app_version
  locale
  ip_address
  created_at
  last_active_at
  is_current
  has_active_websocket
}

query GetMyActiveSessions {
  getMyActiveSessions {
    ...ActiveSessionFields
  }
}

mutation RevokeMySession($sessionId: String!) {
  revokeMySession(sessionId: $sessionId)
}

mutation RevokeCurrentSession {
  revokeCurrentSession
}

mutation RevokeAllOtherSessions($stepUpToken: String!) {
  revokeAllOtherSessions(stepUpToken: $stepUpToken)
}

mutation RequestStepUpVerification {
  requestStepUpVerification
}

mutation VerifyStepUpVerification($code: String!) {
  verifyStepUpVerification(code: $code)
}
